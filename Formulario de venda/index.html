<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de vendas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
</head>

<body>
    <header>
        <h1>Cadastre seu veiculo para vender mais rapido</h1>
        <p>Descreva as caracteristicas, a marca, e os opcionais que ele possui.</p>
        <p>Os itens marcados com <span>*</span> são de preenchimento obrigatorio!</p>
    </header>

    <main>
    <form>
        <div class="formtitle">
        <h2>Formulario</h2>
        </div>

        <div class="container">
            <label for="titulo">Descreva o titulo do anuncio: <span>*</span></label>
            <input type="text" name="titulo" placeholder="Titulo para anunciar seu carro" required>
        </div>

        <div class="container">
            <label for="preco">Preço (R$): <span>*</span></label>
            <input type="number" step="0.01" name="preço" placeholder="15000,75" required>
        </div>

        <div class="container">
            <label for="descricao">Descrição: <span>*</span></label>
            <textarea name="descricao" required></textarea>
        </div>

        <div class="container">
            <label for="marca">Marca: <span>*</span></label>
            <input type="text" placeholder="Jeep" required>
        </div>

        <div class="container">
            <label for="modelo">Modelo: <span>*</span></label>
            <input type="text" placeholder="Renegade" required>
        </div>
        
        <div class="container">
            <label for="km">Quilometragem (KM): <span>*</span></label>
            <input type="number" placeholder="2500" required>
        </div>

        <div class="container">
            <label for="datacompra">Data da compra: <span>*</span></label>
            <input type="date" required>
        </div>

        <div class="container" id="radio">
            <label for="cambio">Tipo de cambio: <span>*</span></label>
            <div class="radio">
                <div class="opcoes">
                <input type="radio" value="manual" name="cambio" required>
                <label for="manual">Manual</label>
                </div>
                <div class="opcoes">        
                <input type="radio" value="automatico" name="cambio" required>
                <label for="automatico">Automatico</label>
                </div>
            </div>
        </div>

        <div class="container">
            
            <label for="opcionais">Opcionais: </label>
            <div id="checkbox">
            <div class="opcoes">
                <input type="checkbox" name="airbag[]" value="airbag">
                <label for="airbag">Airbag</label>
            </div>
            <div class="opcoes">
                <input type="checkbox" name="alarme[]" value="alarme">
                <label for="alarme">Alarme</label>
            </div>
            <div class="opcoes">
                <input type="checkbox" name="ar_condicionado[]" value="ar_condicionado">
                <label for="ar_condicionado">Ar Condicionado</label>
            </div>
            <div class="opcoes">
                <input type="checkbox" name="camera[]" value="camera">
                <label for="camera">Camera de ré</label>
            </div>
            <div class="opcoes">
                <input type="checkbox" name="assistente[]" value="assistente">
                <label for="assistente">Assistente de pista</label>
            </div>
            <div class="opcoes">
                <input type="checkbox" name="partida[]" name="partida">
                <label for="partida">Partida em kayless</label>
            </div>
            <div class="opcoes">
                <input type="checkbox" name="integracao[]" value="integracao">
                <label for="integracao">Integração com celular</label>
            </div>
            <div class="opcoes">
                <input type="checkbox" name="banco_couro[]" value="banco_couro">
                <label for="banco_couro">Bando de couro</label>
            </div>
            </div>
        </div>

        <div class="container" >
            <label for="imgcarro">Carregue um arquivo:</label>
            <input id="fileimg" type="file" name="imgcarro" value="imgcarro">
        </div>

        <div class="container" id="submit">
            <input type="submit" id="btn" value="CADASTRAR">
        </div>
    </form>
    </main>
    
</body>

</html>
